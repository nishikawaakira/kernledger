name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: build / vet / test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ['1.22', '1.23']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          check-latest: true
          cache: true

      - name: gofmt check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race -count=1 ./...

      - name: cross-compile linux/amd64
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: amd64
        run: go build -trimpath -o /tmp/kernledger ./cmd/kernledger

      - name: cross-compile linux/arm64
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: arm64
        run: go build -trimpath -o /tmp/kernledger-arm64 ./cmd/kernledger
